version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nn_events_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-nn_events}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nn_events_network

  redis:
    image: redis:7-alpine
    container_name: nn_events_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nn_events_network

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    container_name: nn_events_bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
    restart: unless-stopped
    networks:
      - nn_events_network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: nn_events_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
    restart: unless-stopped
    networks:
      - nn_events_network

volumes:
  postgres_data:

networks:
  nn_events_network:
    driver: bridge
